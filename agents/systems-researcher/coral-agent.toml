edition = 4

[agent]
name = "systems-researcher"
version = "0.1.0"
description = "Eve-backed specialist for systems architecture, implementation, integration, reliability, and observability research on arbitrary topics."
summary = "Systems specialist for deep research."
readme = "Executable Eve-backed Coral agent. Uses Coral coordination, app-owned SQLite blackboard tools, Exa MCP research, and negotiation before finalization."

[agent.license]
type = "text"
text = "MIT"

[options]
MODEL_NAME = { type = "string", default = "deepseek-v4-pro" }
BLACKBOARD_DB_PATH = { type = "string", default = ".delve/blackboard.db" }
RESEARCH_ROLE = { type = "string", default = "systems-researcher" }

[options.CORAL_API_KEY]
type = "string"
required = false
secret = true
transport = "env"

[options.EXA_API_KEY]
type = "string"
required = false
secret = true
transport = "env"

[[llm.proxies]]
name = "CORAL_MAIN"
format = "OpenAI"
model = "deepseek-v4-pro"

[runtimes.executable]
path = "bash"
arguments = ["startup.sh"]
transport = "streamable_http"
